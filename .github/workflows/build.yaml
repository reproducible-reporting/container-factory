name: Build and Push Container Images

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.detect.outputs.include }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed containers
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | python .github/matrix.py >> "$GITHUB_OUTPUT"

  build-push:
    needs: detect
    if: needs.detect.outputs.include != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          ${{ fromJson(needs.detect.outputs.include) }}
    env:
      VARIANT: ${{ matrix.variant }}
      BUILD_ID_FILE: containers/${{ matrix.container }}/build_id.txt
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Cache downloads
        uses: actions/cache@v5
        with:
          path: |
            cache
          key: ${{ matrix.container }}
      - name: Check Podman version
        run: podman --version
      - name: Validate build ID
        id: build_id
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Pull request build detected. Skipping push."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get and validate the Build IDs (must be a non-negative integer)
          NEW_ID=$(cat "$BUILD_ID_FILE" | tr -d '[:space:]')
          if ! [[ "$NEW_ID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: build_id.txt contains '${NEW_ID}', which is not a non-negative integer."
            exit 1
          fi

          if git cat-file -e "HEAD^1:${BUILD_ID_FILE}" 2>/dev/null; then
            OLD_ID=$(git show "HEAD^1:${BUILD_ID_FILE}" | tr -d '[:space:]')
            if ! [[ "$OLD_ID" =~ ^[0-9]+$ ]]; then
              echo "ERROR: previous build_id.txt contains '${OLD_ID}', which is not a non-negative integer."
              exit 1
            fi
          else
            echo "No previous build_id.txt found. Skipping push."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$NEW_ID" -eq "0" ]; then
            echo "Zero build ID detected. Skipping push."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          elif [ "$NEW_ID" -eq "$OLD_ID" ]; then
            echo "Build ID unchanged (${OLD_ID}). Skipping push."
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          else
            echo "Build ID changed from ${OLD_ID} to ${NEW_ID}. Will push."
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image
        id: build
        working-directory: containers/${{ matrix.container }}
        run: |
          ./build.sh
          cat image_tag.txt >> "$GITHUB_OUTPUT"
      - name: Test image
        if: ${{ hashFiles(format('containers/{0}/test.sh', matrix.container)) != '' }}
        working-directory: containers/${{ matrix.container }}
        run: |
          ./test.sh
      - name: Login to GitHub Container Registry
        if: steps.build_id.outputs.should_push == 'true'
        run: podman login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
      - name: Push image to GitHub Container Registry
        if: steps.build_id.outputs.should_push == 'true'
        run: |
          IMAGE_TAG=${{ steps.build.outputs.image_tag }}
          podman push ${IMAGE_TAG} ghcr.io/${{ github.repository_owner }}/${IMAGE_TAG}
